# 训练超参数配置
TRAIN:
  batch_size: 4
  eval_batch_size: 4
  num_epochs: 600
  num_workers: 6
  
  learning_rate: 0.0001
  weight_decay: 0.0001
  
  scheduler:
    factor: 0.5
    patience: 5
    threshold: 0.001
    min_lr: 1.0e-7
  
  early_stopping:
    patience: 27
    min_delta: 0.0006
  
  grad_clip: null
  use_amp: false
  
  warmup:
    epochs: 0
    min_lr: 1.0e-8
  
  checkpoint:
    save_every: 1
    keep_checkpoints: 1000
  
  log_interval: 100
  
  with_body_label: false
  segment_parallel: false
  use_drop_first: true
  use_denoise: false
  use_replace_noise: false
  replace_noise_pc_rate: 0.2

# 损失函数配置
LOSS:
  chamfer_loss: false
  nn_loss: false
  flow_loss: false
  end_loss: false
  pose_loss: true
  zmp_loss: false
  bone_loss: false

# 模型架构配置
DEVICE: 'cuda'

MAMBA:
  d_model: 1024
  d_state: 16
  d_conv: 4
  expand: 2
  n_layers: 2
  dropout: 0.1

TEMPORAL_LOSS:
  enabled: true
  weight: 0.1
  velocity_weight: 1.0
  acceleration_weight: 0.5
  bone_length_weight: 0.3

MULTIMODAL:
  enabled: false
  rgb_encoder: 'resnet18'
  fusion_type: 'gcsp'

MODEL:
  TpointNet2: false
  Outline: true
  Outline_boundary: false
  add_background: false
  add_twise_noise: false
  use_project_image: false
  use_back_wang: false
  use_transformer: false
  use_attention: false
  use_mdmtransformer: false

Transformer:
  num_hidden_layers: 3
  hidden_size: 1024
  num_attention_heads: 2
  intermediate_size: 512
  hidden_dropout_prob: 0.1

MDMTransformer:
  latent_dim: 1536
  dropout: 0.1
  num_heads: 4
  ff_size: 1024
  activation: 'gelu'
  num_layers: 8
  data_rep: 'rot6d'
  njoints: 24
  nfeats: 3
  seqlen: 16
