# 模型架构配置
DEVICE: 'cuda'

# Mamba时序模块配置
MAMBA:
  d_model: 1024
  d_state: 16
  d_conv: 4
  expand: 2
  n_layers: 2
  dropout: 0.1

# 时序一致性损失配置
TEMPORAL_LOSS:
  enabled: true
  weight: 0.1
  velocity_weight: 1.0
  acceleration_weight: 0.5
  bone_length_weight: 0.3

# 多模态融合配置（预留）
MULTIMODAL:
  enabled: false
  rgb_encoder: 'resnet18'
  fusion_type: 'gcsp'

# 模型架构选项
MODEL:
  TpointNet2: false
  Outline: true
  Outline_boundary: false
  add_background: false
  add_twise_noise: false
  use_project_image: false
  use_back_wang: false
  use_transformer: false
  use_attention: false
  use_mdmtransformer: false

# Transformer配置
Transformer:
  num_hidden_layers: 3
  hidden_size: 1024
  num_attention_heads: 2
  intermediate_size: 512
  hidden_dropout_prob: 0.1

# MDM Transformer配置
MDMTransformer:
  latent_dim: 1536
  dropout: 0.1
  num_heads: 4
  ff_size: 1024
  activation: 'gelu'
  num_layers: 8
  data_rep: 'rot6d'
  njoints: 24
  nfeats: 3
  seqlen: 16
