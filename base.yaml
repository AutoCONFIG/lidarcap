DEVICE: 'cuda'

MAMBA:
  d_model: 1024
  d_state: 16
  d_conv: 4
  expand: 2
  n_layers: 2
  dropout: 0.1

TEMPORAL_LOSS:
  enabled: True
  weight: 0.1
  velocity_weight: 1.0
  acceleration_weight: 0.5
  bone_length_weight: 0.3

MULTIMODAL:
  enabled: False
  rgb_encoder: 'resnet18'
  fusion_type: 'gcsp'

TRAIN:
  GEN:
    # 学习率和优化器参数
    LR: 0.0001                    # 初始学习率
    WD: 0.0001                    # 权重衰减（weight decay）
    
    # 学习率调度器参数（ReduceLROnPlateau）
    factor: 0.5                    # 学习率降低因子（默认：0.5）
    patience: 5                    # 学习率调度器的耐心值（默认：5）
    threshold: 0.001               # 改善阈值（默认：0.001）
    min_lr: 1e-7                  # 最小学习率（默认：1e-7）
    
    # 早停机制参数
    early_stopping: 150             # 早停容忍的epoch数（默认：15，设为0禁用）
    early_stopping_min_delta: 0.001 # 早停最小改善阈值（默认：0.001）
    
    # 梯度裁剪参数
    grad_clip: null                # 梯度裁剪的最大范数（默认：null，禁用）
    
    # 混合精度训练
    use_amp: false                # 使用自动混合精度训练（默认：false）
    
    # 学习率预热参数
    warmup_epochs: 0              # 预热的epoch数（默认：0，禁用）
    warmup_min_lr: 1e-8          # 预热起始的最小学习率（默认：1e-8）
    
    # 检查点保存策略
    save_every: 1                 # 每N个epoch保存一次检查点（默认：1）
    keep_checkpoints: 5            # 保留最近的N个检查点（默认：5）
    
    # 评估指标
    metrics: 'train.mean_loss_param'
  with_body_label: False
  segment_parallel: False
  CosineAnnealingWarmRestarts: False
  use_drop_first: True
  use_denoice: False
  use_replace_noice: False
  no_denoice: False
  replace_noice_pc_rate: 0.2

MODEL:
  TpointNet2: False
  Outline: True
  Outline_boundary: False
  add_background: False
  add_twise_noise: False
  use_project_image: False
  use_back_wang: False
  use_transformer: False
  use_attention: False
  use_mdmtransformer: False

Transformer:
  num_hidden_layers: 3
  hidden_size: 1024
  num_attention_heads: 2
  intermediate_size: 512
  hidden_dropout_prob: 0.1
  
MDMTransformer:
  latent_dim: 1536
  dropout: 0.1
  num_heads: 4
  ff_size: 1024
  activation: 'gelu'
  num_layers: 8
  data_rep: 'rot6d'
  njoints: 24
  nfeats: 3
  seqlen: 16
  
LOSS:
  chamfer_loss: False
  nn_loss: False
  flow_loss: False
  end_loss: False
  pose_loss: True
  zmp_loss: False
  bone_loss: False

TrainDataset:
  dataset_path: '/media/yun/41306b47-5fbd-4e11-a4f8-13c59e123adf1/lidarhuman26M/lidarcap_train.hdf5'
  use_aug: False
  use_rot: False
  concat_info: False
  use_straight: False
  use_pc_w_raw_z: False
  ret_raw_pc: True
  seqlen: 16
  drop_first_n: 0
  use_trans_to_normalize: True
  replace_noice_pc: False
  replace_noice_pc_rate: False
  replace_pc_strategy: 'random'
  noise_distribution: 'uniform'
  add_noice_pc: False
  set_body_label_all_one: False
  random_permutation: False
  use_boundary: False
  inside_random: False
  use_sample: False
  range_image: False
  range_image_W: 512
  range_image_H: 512
  fov_up: 12.5
  
  dataset_ids:
    - lidarcap_train
  
TestDataset:
  dataset_path: '/media/yun/41306b47-5fbd-4e11-a4f8-13c59e123adf1/lidarhuman26M/lidarcap_test.hdf5'
  use_aug: False
  concat_info: False
  use_rot: False
  use_straight: False
  use_pc_w_raw_z: False
  ret_raw_pc: True
  seqlen: 16
  drop_first_n: 0
  use_trans_to_normalize: True
  replace_pc_strategy: 'random'
  replace_noice_pc: False
  replace_noice_pc_rate: False
  noise_distribution: 'uniform'
  add_noice_pc: False
  set_body_label_all_one: False
  random_permutation: False
  use_boundary: False
  inside_random: False
  use_sample: False
  range_image: False
  range_image_W: 512
  range_image_H: 512
  fov_up: 12.5
  
  dataset_ids:
    - lidarcap_test
